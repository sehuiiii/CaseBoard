services:
  postgres:
    image: postgres:16-alpine
    container_name: caseboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: caseboard
      POSTGRES_PASSWORD: caseboard
      POSTGRES_DB: caseboard
    ports:
      - "5435:5432"
    volumes:
      - caseboard-postgres-data:/var/lib/postgresql/data

volumes:
  caseboard-postgres-data:
